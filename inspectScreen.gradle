tasks.register('inspectScreen') { doLast { def urls = (project.configurations.compileClasspath.files + project.sourceSets.client.compileClasspath.files).collect { it.toURI().toURL() } as java.net.URL[]; def loader = new java.net.URLClassLoader(urls, (ClassLoader) null); try { def c = Class.forName('net.minecraft.client.gui.screen.Screen', false, loader); println '== Screen =='; c.declaredMethods.findAll { it.name.contains('render') }.each { println it } } catch(Exception e) { e.printStackTrace() } } }
