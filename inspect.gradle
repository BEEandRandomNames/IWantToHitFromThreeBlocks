tasks.register('inspect121') { doLast { def loader = new java.net.URLClassLoader(project.configurations.compileClasspath.files.collect { it.toURI().toURL() } as java.net.URL[], (ClassLoader) null); try { def c1 = Class.forName('net.minecraft.client.gui.hud.InGameHud', false, loader); println '== InGameHud =='; c1.declaredMethods.findAll { it.name == 'renderCrosshair' || it.name.contains('rosshair') }.each { println it } } catch(Exception e) { e.printStackTrace() }; try { def c2 = Class.forName('net.minecraft.client.gui.DrawContext', false, loader); println '== DrawContext.drawGuiTexture =='; c2.declaredMethods.findAll { it.name.contains('drawGuiTexture') }.each { println it } } catch(Exception e) { e.printStackTrace() }; try { def c3 = Class.forName('net.minecraft.client.render.WorldRenderer', false, loader); println '== WorldRenderer.render =='; c3.declaredMethods.findAll { it.name == 'render' }.each { println it } } catch(Exception e) { e.printStackTrace() }; try { def c4 = Class.forName('net.minecraft.client.render.RenderTickCounter', false, loader); println '== RenderTickCounter =='; c4.declaredMethods.each { println it } } catch(Exception e) { e.printStackTrace() }; try { def c5 = Class.forName('net.minecraft.client.render.VertexConsumer', false, loader); println '== VertexConsumer =='; c5.declaredMethods.each { println it } } catch(Exception e) { e.printStackTrace() } } }
