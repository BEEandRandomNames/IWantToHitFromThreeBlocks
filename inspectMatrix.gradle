tasks.register('inspectMatrix') { doLast { def urls = (project.configurations.compileClasspath.files + project.sourceSets.client.compileClasspath.files).collect { it.toURI().toURL() } as java.net.URL[]; def loader = new java.net.URLClassLoader(urls, (ClassLoader) null); try { def c = Class.forName('net.minecraft.client.util.math.MatrixStack', false, loader); println '== MatrixStack =='; c.declaredMethods.each { println it } } catch(Exception e) { e.printStackTrace() } } }
